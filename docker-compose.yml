services:
  backend:
    build: ./backend
    container_name: basile-backend
    ports:
      - "8000:8000"
    environment:
      - BASILE_WEBHOOK_URL=https://basile.basileia.global/ingress-api/webhook/basile-chat
    volumes:
      - basile-db:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
        NEXT_PUBLIC_WS_BASE: ws://localhost:8000
    container_name: basile-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  basile-db:
